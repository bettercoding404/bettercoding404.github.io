title: BetterCoding404的技术博客，专注于技术分享
lang: zh-Hans
description: >- # this means to ignore newlines until "baseurl:"
  BetterCoding404的技术博客，专注于技术分享，包括但不限于前端、后端、运维、架构、算法等技术领域。
baseurl: ""
url: "" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  bettercoding404
permalink: /:title
# Build settings
theme: minima
google_analytics: G-FB1SZ78W8Y
paginate: 20  # Number of posts per page
paginate_path: "/page:num"  # URL path for paginated pages
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
 - template.markdown
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
